<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NEXUS · Talent Growth Engine</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════
   THEME VARIABLES
══════════════════════════════════ */
:root{
  --gold:#e2c97e;--gold2:#c9922a;--cyan:#00d4ff;--violet:#a78bfa;
  --amber:#f59e0b;--green:#34d399;--red:#ef4444;--orange:#f97316;
}
[data-theme="dark"]{
  --bg:#07090f;--bg2:#0d1220;--bg3:#111827;
  --surface:rgba(255,255,255,0.025);--surface2:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--text4:#475569;
  --grid-line:rgba(226,201,126,0.025);
  --blob1:rgba(226,201,126,0.05);--blob2:rgba(0,212,255,0.04);
  --card-bg:rgba(255,255,255,0.025);
  --input-bg:rgba(255,255,255,0.04);
  --shadow:rgba(0,0,0,0.5);
  --scrollbar:#1e3a5f;
}
[data-theme="light"]{
  --bg:#d8e4f4;--bg2:#ffffff;--bg3:#eaf0fb;
  --surface:#ffffff;--surface2:#f1f5fd;
  --border:rgba(30,60,140,0.13);--border2:rgba(30,60,140,0.22);
  --text:#0f172a;--text2:#1e293b;--text3:#374151;--text4:#6b7280;
  --grid-line:rgba(60,90,180,0.07);
  --blob1:rgba(226,201,126,0.18);--blob2:rgba(0,180,220,0.10);
  --card-bg:#ffffff;
  --input-bg:#f8faff;
  --shadow:rgba(15,30,80,0.12);
  --scrollbar:#94a3b8;
}

/* ══════════════════════════════════
   BASE
══════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:4px}

body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:64px 64px;z-index:0}

.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.blob1{top:-20%;right:-10%;width:55vw;height:55vw;background:radial-gradient(circle,var(--blob1) 0%,transparent 70%)}
.blob2{bottom:-25%;left:-10%;width:50vw;height:50vw;background:radial-gradient(circle,var(--blob2) 0%,transparent 70%)}

.wrap{max-width:800px;margin:0 auto;padding:0 20px 100px;position:relative;z-index:1}

/* ══════════════════════════════════
   HEADER
══════════════════════════════════ */
.header{padding:36px 0 24px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14}
.header-title{font-family:'Cinzel',serif;font-size:clamp(20px,5vw,34px);font-weight:900;color:var(--text);line-height:1.1}
.header-title span{color:var(--gold)}
.header-sub{font-size:10px;letter-spacing:3px;color:var(--gold);font-weight:700;margin-bottom:7px}
.header-actions{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 9px;border-radius:20px}
.top-btns{display:flex;gap:7px;flex-wrap:wrap;align-items:center}

/* ── THEME TOGGLE ── */
.theme-toggle{width:50px;height:26px;border-radius:13px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;position:relative;transition:all .3s;flex-shrink:0}
.theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:var(--gold);transition:transform .3s}
[data-theme="light"] .theme-toggle::after{transform:translateX(24px);background:var(--gold2)}
.theme-icon{font-size:11px;position:absolute;top:50%;transform:translateY(-50%);transition:all .3s}
.theme-icon.moon{left:7px}
.theme-icon.sun{right:6px}

/* ══════════════════════════════════
   API KEY BANNER
══════════════════════════════════ */
.api-banner{border-radius:14px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;transition:all .4s}
.api-banner.no-key{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25)}
.api-banner.has-key{background:rgba(52,211,153,0.07);border:1px solid rgba(52,211,153,0.25)}
.api-input{flex:1;min-width:200px;background:var(--input-bg);border:1px solid var(--border2);border-radius:10px;padding:9px 14px;font-size:13px;color:var(--text);font-family:'DM Mono',monospace;outline:none;transition:all .2s}
.api-input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,0.12)}
.api-input::placeholder{color:var(--text4);font-family:'DM Sans',sans-serif}

/* ══════════════════════════════════
   DEMO BANNER
══════════════════════════════════ */
.demo-banner{background:linear-gradient(135deg,rgba(167,139,250,0.1),rgba(0,212,255,0.07));border:1px solid rgba(167,139,250,0.25);border-radius:14px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}

/* ══════════════════════════════════
   PHASE BAR
══════════════════════════════════ */
.phase-bar{display:flex;position:relative;margin-bottom:32px}
.phase-bar::before{content:'';position:absolute;top:17px;left:0;right:0;height:1px;background:var(--border);z-index:0}
.phase-node{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;z-index:1}
.phase-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid;transition:all .5s;background:var(--bg)}
.phase-lbl{font-size:9px;letter-spacing:1.5px;font-weight:700;text-align:center;transition:color .5s}

/* ══════════════════════════════════
   CARDS
══════════════════════════════════ */
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:18px;padding:24px;margin-bottom:20px;transition:background .4s,border-color .4s}
.card-gold{border-color:rgba(226,201,126,0.18);background:rgba(226,201,126,0.03)}
.card-cyan{border-color:rgba(0,212,255,0.18);background:rgba(0,212,255,0.03)}
.card-violet{border-color:rgba(167,139,250,0.18);background:rgba(167,139,250,0.03)}
.card-amber{border-color:rgba(245,158,11,0.18);background:rgba(245,158,11,0.03)}
.card-green{border-color:rgba(52,211,153,0.18);background:rgba(52,211,153,0.03)}
[data-theme="light"] .card{box-shadow:0 2px 16px rgba(15,30,80,0.08)}
[data-theme="light"] .card-gold{background:#fffbf0;border-color:rgba(201,146,42,0.28)}
[data-theme="light"] .card-cyan{background:#f0faff;border-color:rgba(0,180,220,0.28)}
[data-theme="light"] .card-violet{background:#f8f5ff;border-color:rgba(124,58,237,0.22)}
[data-theme="light"] .card-amber{background:#fffbf0;border-color:rgba(217,119,6,0.28)}
[data-theme="light"] .card-green{background:#f0fdf8;border-color:rgba(5,150,105,0.22)}
[data-theme="light"] .prio-row{box-shadow:0 1px 6px rgba(15,30,80,0.06)}
[data-theme="light"] .sched-row{box-shadow:0 1px 6px rgba(15,30,80,0.06)}
[data-theme="light"] .quiz-card{box-shadow:0 1px 6px rgba(15,30,80,0.06)}
[data-theme="light"] .role-pill{background:#f1f5fd;color:#374151}
[data-theme="light"] .role-pill.active{background:#fef9ed;color:#92600a}
[data-theme="light"] .modal-box{background:#ffffff;border-color:rgba(30,60,140,0.15)}
[data-theme="light"] .api-banner.no-key{background:#fffbee;border-color:rgba(217,119,6,0.35)}
[data-theme="light"] .api-banner.has-key{background:#f0fdf8;border-color:rgba(5,150,105,0.3)}
[data-theme="light"] .demo-banner{background:linear-gradient(135deg,rgba(139,92,246,0.08),rgba(6,182,212,0.06));border-color:rgba(124,58,237,0.2)}
[data-theme="light"] .share-bar{background:#f8faff;border-color:rgba(30,60,140,0.13)}
[data-theme="light"] .voice-bar{background:#fff;border-color:rgba(201,146,42,0.3)}

.layer-label{font-size:10px;letter-spacing:3px;font-weight:700;margin-bottom:5px}
.section-title{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.section-desc{font-size:13px;color:var(--text3);margin-bottom:18px;line-height:1.6}

/* ══════════════════════════════════
   ROLE PILLS & SLIDERS
══════════════════════════════════ */
.role-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
.role-pill{padding:8px 16px;border-radius:30px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text3);background:var(--surface);transition:all .2s}
.role-pill.active{background:rgba(226,201,126,0.12);border-color:rgba(226,201,126,0.4);color:var(--gold)}
.role-pill:hover{transform:translateY(-2px)}
.skill-row{margin-bottom:14px}
.skill-row-head{display:flex;justify-content:space-between;margin-bottom:5px}
.skill-name{font-size:13px;color:var(--text2);font-weight:500}
.skill-val{font-size:12px;font-family:'DM Mono',monospace;color:var(--gold);font-weight:700}
.track{position:relative;height:7px;background:var(--surface2);border-radius:4px;cursor:pointer}
.fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:4px;transition:width .2s;pointer-events:none}
input[type=range]{position:absolute;inset:0;width:100%;opacity:0;cursor:pointer;height:100%;margin:0}

/* ══════════════════════════════════
   GAP & PRIORITY
══════════════════════════════════ */
.gap-row{margin-bottom:12px;opacity:0;transform:translateX(-14px);transition:all .5s}
.gap-row.show{opacity:1;transform:translateX(0)}
.gap-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.gap-track{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
.gap-current{position:absolute;left:0;height:100%;border-radius:4px;background:rgba(226,201,126,0.25)}
.gap-fill{position:absolute;height:100%;border-radius:4px;transition:width 1s}
.prio-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;border:1px solid}
.prio-row{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;opacity:0;animation:fadeUp .4s ease forwards}
.prio-num{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;min-width:24px}

/* ══════════════════════════════════
   TABS
══════════════════════════════════ */
.tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:30px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text3);background:var(--surface);transition:all .2s}
.tab.active{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.35);color:var(--amber)}

/* ══════════════════════════════════
   LEARNING MODULE
══════════════════════════════════ */
.key-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px;margin-bottom:14px}
.key-item{display:flex;gap:8px;align-items:flex-start;background:var(--surface);border-radius:10px;padding:10px 12px}
.pro-tip{background:rgba(226,201,126,0.07);border:1px solid rgba(226,201,126,0.18);border-radius:12px;padding:12px 16px;margin-bottom:12px}
.res-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.res-chip{font-size:11px;padding:5px 12px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--text3)}
.sample-note{background:rgba(167,139,250,0.07);border:1px solid rgba(167,139,250,0.2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--violet);margin-bottom:14px;display:flex;gap:8px;align-items:flex-start}

/* ══════════════════════════════════
   QUIZ
══════════════════════════════════ */
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px}
.quiz-q{font-size:14px;color:var(--text);margin-bottom:12px;line-height:1.6}
.opt{width:100%;padding:10px 14px;border-radius:10px;font-size:13px;text-align:left;cursor:pointer;background:var(--surface2);border:1px solid var(--border);color:var(--text2);transition:all .2s;font-family:'DM Sans',sans-serif;margin-bottom:6px;display:block}
.opt:hover:not(:disabled){border-color:var(--amber);color:var(--amber)}
.opt.correct{background:rgba(52,211,153,0.1)!important;border-color:var(--green)!important;color:var(--green)!important}
.opt.wrong{background:rgba(239,68,68,0.1)!important;border-color:var(--red)!important;color:var(--red)!important}
.quiz-score{font-size:13px;font-family:'DM Mono',monospace;padding:6px 14px;border-radius:20px;background:var(--surface);border:1px solid var(--border)}

/* ══════════════════════════════════
   SCHEDULE & LOG
══════════════════════════════════ */
.sched-row{display:flex;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;opacity:0;animation:fadeUp .4s ease forwards}
.sched-week{font-family:'DM Mono',monospace;font-size:11px;color:var(--green);font-weight:700;text-align:center;min-width:54px}
.session-chip{font-size:10px;padding:3px 10px;border-radius:20px;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);color:var(--green);display:inline-block;margin:2px}
.log-item{font-size:13px;color:var(--text2);padding:8px 0;border-bottom:1px solid var(--border);opacity:0;animation:fadeUp .3s ease forwards}

/* ══════════════════════════════════
   SHARE BAR
══════════════════════════════════ */
.share-bar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:16px}
.share-label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text3);margin-right:4px}
.share-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:30px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid;transition:all .2s;font-family:'DM Sans',sans-serif;background:var(--surface2)}
.share-btn:hover{transform:translateY(-2px)}
.share-wa{border-color:rgba(37,211,102,0.4);color:#25d366}
.share-wa:hover{background:rgba(37,211,102,0.1)}
.share-email{border-color:rgba(0,212,255,0.4);color:var(--cyan)}
.share-email:hover{background:rgba(0,212,255,0.1)}
.share-copy{border-color:var(--border2);color:var(--text3)}
.share-copy:hover{background:var(--surface2);color:var(--text)}

/* ══════════════════════════════════
   PROGRESS TRACKER
══════════════════════════════════ */
.progress-bar-wrap{height:10px;background:var(--surface2);border-radius:6px;overflow:hidden;margin-bottom:4px}
.progress-bar-fill{height:100%;border-radius:6px;transition:width .8s}
.progress-skill{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;flex-wrap:wrap;gap:12px}

/* ══════════════════════════════════
   BUTTONS
══════════════════════════════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 22px;border-radius:13px;font-size:13px;font-weight:700;letter-spacing:.4px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:scale(.97)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07090f;box-shadow:0 0 24px rgba(226,201,126,0.2)}
.btn-gold:hover{box-shadow:0 8px 32px rgba(226,201,126,0.35)}
.btn-violet{background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff}
.btn-ghost{background:var(--surface);color:var(--text3);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2)}
.btn-green{background:linear-gradient(135deg,#34d399,#059669);color:#fff}
.btn-demo{background:linear-gradient(135deg,#a78bfa,#00d4ff);color:#fff}
.btn-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:18px}
.btn-full{width:100%}

/* ══════════════════════════════════
   LOADING
══════════════════════════════════ */
.loading-ring{width:56px;height:56px;border-radius:50%;border:2px solid rgba(245,158,11,.15);border-top:2px solid var(--amber);animation:spin 1s linear infinite;margin:0 auto 20px}

/* ══════════════════════════════════
   MODAL
══════════════════════════════════ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;overflow:auto;padding:30px 16px}
.modal-box{max-width:620px;margin:0 auto;background:var(--bg2);border:1px solid var(--border2);border-radius:22px;padding:28px;position:relative}

/* ══════════════════════════════════
   ANIMATIONS
══════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes glow{0%,100%{box-shadow:0 0 18px rgba(226,201,126,.15)}50%{box-shadow:0 0 36px rgba(226,201,126,.4)}}
.fade-up{animation:fadeUp .5s ease forwards}
.pulse-anim{animation:pulse 1.5s ease infinite}
.glow-anim{animation:glow 2.5s ease infinite}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>



<!-- ── PROGRESS MODAL ── -->
<div class="modal-overlay" id="progressModal">
  <div class="modal-box">
    <button onclick="closeModal('progressModal')" style="position:absolute;top:16px;right:18px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer">✕</button>
    <div class="layer-label" style="color:var(--gold)">📊 PROGRESS TRACKER</div>
    <div class="section-title" style="margin-bottom:4px">Your Learning Journey</div>
    <div class="section-desc" style="margin-bottom:16px">Saved across browser sessions · localStorage</div>
    <div id="progressContent"></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="clearProgress()">🗑 Clear All</button>
      <button class="btn btn-gold" onclick="exportPDF()">📄 Export PDF</button>
    </div>
  </div>
</div>

<!-- ── SHARE MODAL ── -->
<div class="modal-overlay" id="shareModal">
  <div class="modal-box">
    <button onclick="closeModal('shareModal')" style="position:absolute;top:16px;right:18px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer">✕</button>
    <div class="layer-label" style="color:var(--green)">📤 SHARE LEARNING PLAN</div>
    <div class="section-title" style="margin-bottom:4px">Share Your Plan</div>
    <div class="section-desc">Send your personalised learning roadmap via WhatsApp or Email.</div>
    <div id="sharePreview" style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:12px;color:var(--text2);line-height:1.7;max-height:200px;overflow:auto;font-family:'DM Mono',monospace;margin-bottom:18px;white-space:pre-wrap"></div>

/* ══════════════════════════════════════════
   CLAUDE API
══════════════════════════════════════════ */
async function callClaude(prompt,system="Respond ONLY in valid JSON. No markdown fences, no preamble."){
  const key=getApiKey();
  if(!key)throw new Error("NO_KEY");
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages:[{role:"user",content:prompt}]})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return(d.content||[]).map(b=>b.text||"").join("");
}
function parseJSON(raw){
  try{return JSON.parse(raw.replace(/```json|```/g,"").trim());}catch{return null;}
}

/* ══════════════════════════════════════════
   PROGRESS CALCULATION
   Real metric = (ticked checklist items + correct quiz answers)
                 / (total key points + total quiz questions)
══════════════════════════════════════════ */
function calcProgress(){
  const totalPoints=state.genContent.reduce((a,g)=>a+(g.keyPoints?.length||0),0);
  const totalQuiz=state.quiz.length;
  const total=totalPoints+totalQuiz;
  if(!total)return{pct:0,checked:0,totalPoints,correctQuiz:state.quizScore.correct,totalQuiz};
  const checked=Object.values(state.checklist).filter(Boolean).length;
  const pct=Math.round((checked+state.quizScore.correct)/total*100);
  return{pct:Math.min(pct,100),checked,totalPoints,correctQuiz:state.quizScore.correct,totalQuiz};
}

/* ══════════════════════════════════════════
   PDF EXPORT
══════════════════════════════════════════ */
function exportPDF(){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const W=doc.internal.pageSize.getWidth();
  let y=18;const lh=7;

  const addLine=(text,size,rgb,x=16,bold=false)=>{
    doc.setFontSize(size);
    if(rgb)doc.setTextColor(...rgb);
    if(bold)doc.setFont(undefined,"bold"); else doc.setFont(undefined,"normal");
    const lines=doc.splitTextToSize(String(text||""),W-32);
    lines.forEach(l=>{if(y>278){doc.addPage();y=18;}doc.text(l,x,y);y+=lh;});
  };

  const addDivider=()=>{
    doc.setDrawColor(220,220,230);doc.setLineWidth(0.3);
    doc.line(16,y,W-16,y);y+=5;
  };

  const sectionHeader=(title,rgb)=>{
    y+=3;
    doc.setFillColor(...rgb,20);
    doc.roundedRect(14,y-5,W-28,10,2,2,"F");
    addLine(title,11,rgb,16,true);
    y+=2;
  };

  // ── HEADER BLOCK ──
  doc.setFillColor(7,9,15);doc.rect(0,0,W,34,"F");
  doc.setFont(undefined,"bold");doc.setFontSize(18);doc.setTextColor(226,201,126);
  doc.text("NEXUS · Talent Growth Engine",16,16);
  doc.setFont(undefined,"normal");doc.setFontSize(9);doc.setTextColor(148,163,184);
  doc.text(`Role: ${state.role}`,16,24);
  doc.text(`Date: ${new Date().toLocaleDateString()}`,90,24);
  doc.text(`Mode: ${state.isDemo?"Demo":"AI-Powered"}`,145,24);
  doc.text(`Quiz: ${state.quizScore.done>0?state.quizScore.correct+"/"+state.quizScore.done:"N/A"}`,185,24);
  y=44;

  // ── SKILL GAPS ──
  sectionHeader("SKILL GAP ANALYSIS  (ML Layer)",  [0,130,200]);
  state.priorities.filter(p=>p.gap>0).forEach((p,i)=>{
    const col=p.priority==="Critical"?[200,40,40]:p.priority==="High"?[220,100,20]:p.priority==="Medium"?[180,130,0]:[30,160,90];
    // row bg
    if(i%2===0){doc.setFillColor(248,250,255);doc.rect(14,y-5,W-28,8,"F");}
    doc.setFontSize(9);doc.setFont(undefined,"bold");doc.setTextColor(30,41,59);
    doc.text(p.skill,18,y);
    doc.setFont(undefined,"normal");doc.setTextColor(100,116,139);
    doc.text(`Current: ${p.current}  →  Required: ${p.required}  |  Gap: ${p.gap}  |  Demand: ${Math.round(p.demand*100)}%`,75,y);
    // priority pill
    doc.setFillColor(...col);doc.roundedRect(W-45,y-4,28,6,2,2,"F");
    doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont(undefined,"bold");
    doc.text(p.priority,W-43,y);
    y+=8;
  });
  addDivider();

  // ── LEARNING MODULES ──
  if(state.genContent.length){
    sectionHeader("PERSONALISED LEARNING MODULES  (Gen AI Layer)",[180,100,10]);
    state.genContent.forEach((g,i)=>{
      addLine(`${i+1}. ${g.skill}`,11,[30,41,59],16,true);
      addLine(g.summary||"",9,[71,85,105]);
      if(g.keyPoints?.length){
        y+=1;
        g.keyPoints.forEach(kp=>addLine(`  • ${kp}`,8,[100,116,139]));
      }
      if(g.proTip){
        y+=1;
        doc.setFillColor(255,251,235);doc.roundedRect(14,y-4,W-28,10,2,2,"F");
        addLine(`💡 Pro Tip: ${g.proTip}`,8,[146,100,20],18);
      }
      if(g.resources?.length){
        addLine(`Resources: ${g.resources.map(r=>r.title).join(" · ")}`,8,[107,114,128]);
      }
      y+=3;
    });
    addDivider();
  }

  // ── SCHEDULE ──
  if(state.schedule.length){
    sectionHeader("AGENT LEARNING SCHEDULE  (Agentic Layer)",[20,140,100]);
    state.schedule.forEach((s,i)=>{
      if(i%2===0){doc.setFillColor(240,255,248);doc.rect(14,y-5,W-28,8,"F");}
      doc.setFontSize(9);doc.setFont(undefined,"bold");doc.setTextColor(30,41,59);
      doc.text(`${s.week}: ${s.skill}`,18,y);
      doc.setFont(undefined,"normal");doc.setTextColor(107,114,128);
      doc.text(`${s.hours}h/week  ·  ${s.sessions.join(", ")}`,90,y);
      y+=8;
      addLine(`  Goal: ${s.milestone}`,8,[100,116,139]);
      y+=2;
    });
    addDivider();
  }

  // ── QUIZ ──
  if(state.quizScore.done>0){
    y+=2;
    const pct=Math.round(state.quizScore.correct/state.quizScore.done*100);
    const scoreCol=pct>=70?[20,140,100]:[180,80,20];
    doc.setFillColor(...scoreCol,15);doc.roundedRect(14,y-5,W-28,12,3,3,"F");
    doc.setFontSize(11);doc.setFont(undefined,"bold");doc.setTextColor(...scoreCol);
    doc.text(`QUIZ RESULT: ${state.quizScore.correct}/${state.quizScore.done}  (${pct}%)  ${pct>=70?"✓ PASS":"✗ Needs Work"}`,18,y+2);
    y+=14;
  }

  // ── DEMO NOTE ──
  if(state.isDemo){
    y+=2;
    doc.setFillColor(248,245,255);doc.roundedRect(14,y-5,W-28,14,3,3,"F");
    doc.setFontSize(8);doc.setFont(undefined,"normal");doc.setTextColor(100,70,180);
    const note=doc.splitTextToSize("Note: This report was generated in DEMO mode using sample data. Add your Claude API key for a fully personalised AI-powered learning plan tailored to your exact skill levels.",W-36);
    note.forEach(l=>{doc.text(l,18,y);y+=6;});
    y+=4;
  }

  // ── FOOTER ──
  doc.setFontSize(7.5);doc.setFont(undefined,"normal");doc.setTextColor(150,160,180);
  doc.text("Generated by NEXUS Quad-Intelligence Platform · Powered by Claude AI · nexus.ai",16,287);

  doc.save(`NEXUS_${state.role.replace(/\s+/g,"_")}_LearningPlan_${new Date().toISOString().slice(0,10)}.pdf`);
  showToast("📄 PDF downloaded!","var(--green)");
}

        <span style="font-size:12px;color:var(--text3)">✅ <strong style="color:${prog.correctQuiz/Math.max(prog.totalQuiz,1)>=.7?"var(--green)":"var(--amber)"}">${prog.correctQuiz}/${prog.totalQuiz}</strong> quiz correct</span>
        <span style="font-size:12px;color:var(--text3)">📅 <strong style="color:var(--green)">${Object.values(state.sessionsDone).filter(Boolean).length}/${state.schedule.reduce((a,s)=>a+(s.sessions?.length||0),0)}</strong> sessions done</span>
      </div>
    </div>

    <!-- GEN AI MODULES with CHECKLIST -->
    <div class="card card-amber">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px">
        <div>
          <div class="layer-label" style="color:var(--amber)">◇ GEN AI · LEARNING MODULES${state.isDemo?' <span style="color:var(--violet)">[DEMO]</span>':''}</div>
          <div class="section-title" style="font-size:16px">Study Material</div>
        </div>
        <button class="btn btn-gold" style="padding:7px 16px;font-size:11px;border-radius:30px;font-weight:800" onclick="exportPDF()">📄 Export PDF</button>
      </div>

      ${state.isDemo?`<div class="sample-note">
        <span>💡</span>
        <span>Sample content for demo. Add your <strong>Claude API key</strong> and reset for a fully personalised AI plan.</span>
      </div>`:""}

      <div class="tabs">
        ${state.genContent.map((g,i)=>{
          const tabPoints=g.keyPoints?.length||0;
          const tabDone=g.keyPoints?.filter((_,ki)=>state.checklist[`${i}_${ki}`]).length||0;
          return`<div class="tab${i===state.activeTab?" active":""}" onclick="switchTab(${i})" style="position:relative">
            ${g.skill}
            <span style="margin-left:6px;font-size:10px;font-weight:700;color:${tabDone===tabPoints&&tabPoints>0?"var(--green)":"inherit"}">${tabDone}/${tabPoints}</span>
          </div>`;
        }).join("")}
      </div>

      ${gc?`
        <!-- Summary -->
        <div style="font-size:14px;color:var(--text);line-height:1.75;margin-bottom:18px;padding:14px 16px;background:var(--surface2);border-radius:12px;border-left:3px solid var(--amber)">
          ${gc.summary||""}
        </div>

        <!-- KEY POINTS CHECKLIST -->
        <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.5px;margin-bottom:10px">KEY LEARNING POINTS · TICK EACH AS YOU STUDY</div>
        <div style="margin-bottom:16px">
          ${(gc.keyPoints||[]).map((kp,ki)=>{
            const key=`${state.activeTab}_${ki}`;
            const done=!!state.checklist[key];
            return`<div onclick="toggleChecklist('${key}')" style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:12px;margin-bottom:8px;cursor:pointer;background:${done?"rgba(52,211,153,0.07)":"var(--surface2)"};border:1px solid ${done?"rgba(52,211,153,0.25)":"var(--border)"};transition:all .2s">
              <div style="width:20px;height:20px;border-radius:6px;border:2px solid ${done?"var(--green)":"var(--border2)"};background:${done?"var(--green)":"transparent"};flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s">
                ${done?'<span style="color:#07090f;font-size:12px;font-weight:900">✓</span>':''}
              </div>
              <span style="font-size:13px;color:${done?"var(--text3)":"var(--text2)"};line-height:1.5;text-decoration:${done?"line-through":"none"};transition:all .2s">${kp}</span>
            </div>`;
          }).join("")}
        </div>

        <!-- PRO TIP -->
        ${gc.proTip?`<div class="pro-tip" style="margin-bottom:14px">
          <span style="font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2px">💡 PRO TIP  </span>
          <span style="font-size:13px;color:var(--text2)">${gc.proTip}</span>
        </div>`:""}

        <!-- RESOURCES -->
        ${gc.resources?.length?`
        <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.5px;margin-bottom:8px">RECOMMENDED RESOURCES</div>
        <div class="res-chips">
          ${gc.resources.map(r=>`<div class="res-chip">
            <span style="color:var(--amber);font-weight:700">${r.type} · </span>${r.title}
          </div>`).join("")}
        </div>`:""}
      `:""}
    </div>

    <!-- QUIZ -->
    ${state.quiz.length?`<div class="card" style="border-color:rgba(245,158,11,.15)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:8px">
        <div class="layer-label" style="color:var(--amber)">◇ GEN AI · KNOWLEDGE CHECK QUIZ${state.isDemo?' <span style="color:var(--violet)">[DEMO]</span>':''}</div>
        ${state.quizScore.done>0?`<span class="quiz-score" style="color:${state.quizScore.correct/state.quizScore.done>=.7?"var(--green)":"var(--amber)"}">
          ${state.quizScore.correct}/${state.quizScore.done} · ${Math.round(state.quizScore.correct/state.quizScore.done*100)}%
        </span>`:""}
      </div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:16px">Answer all questions — each correct answer counts toward your progress score.</div>
      ${state.quiz.map((q,qi)=>renderQuizCard(q,qi)).join("")}
    </div>`:""}

    <!-- AGENT SCHEDULE — TICKABLE SESSIONS -->
    ${state.schedule.length?`<div class="card card-green">
      <div style="margin-bottom:6px">
        <div class="layer-label" style="color:var(--green)">◎ AGENT LAYER · LEARNING SCHEDULE</div>
        <div class="section-title" style="font-size:16px">Weekly Action Plan</div>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:18px">Tick each session as you complete it — your progress updates in real time.</div>
      ${state.schedule.map((s,wi)=>{
        const weekDone=s.sessions.filter((_,si)=>state.sessionsDone[`${wi}_${si}`]).length;
        const allDone=weekDone===s.sessions.length;
        return`<div class="sched-row" style="animation-delay:${wi*150}ms;${allDone?"border-color:rgba(52,211,153,0.35);background:rgba(52,211,153,0.05)":""}">
          <div class="sched-week">
            ${s.week}<br>
            <span style="color:var(--text4);font-size:9px">${s.hours}h/wk</span><br>
            <span style="font-size:9px;margin-top:3px;display:block;color:${allDone?"var(--green)":"var(--text4)"}">${weekDone}/${s.sessions.length} done</span>
          </div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:8px">
              ${s.skill}
              ${allDone?'<span style="font-size:11px;color:var(--green);font-weight:700">✓ Complete</span>':''}
            </div>
            <div style="font-size:11px;color:var(--text3);margin-bottom:10px">🎯 ${s.milestone}</div>
            <div style="display:flex;flex-wrap:wrap;gap:8px">
              ${s.sessions.map((sess,si)=>{
                const skey=`${wi}_${si}`;
                const done=!!state.sessionsDone[skey];
                return`<div onclick="toggleSession('${skey}')" style="display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;background:${done?"rgba(52,211,153,0.12)":"rgba(52,211,153,0.05)"};border:1px solid ${done?"var(--green)":"rgba(52,211,153,0.2)"};color:${done?"var(--green)":"var(--text3)"};transition:all .2s;user-select:none">
                  <span style="font-size:12px">${done?"✓":"○"}</span>
                  ${sess}
                </div>`;
              }).join("")}
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>`:""}

    <!-- SHARE BAR -->
    <div class="share-bar">
      <span class="share-label">📤 SHARE</span>
      <button class="share-btn share-wa" onclick="shareViaWhatsApp()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        WhatsApp
      </button>
      <button class="share-btn share-email" onclick="shareViaEmail()">📧 Email</button>
      <button class="share-btn share-copy" onclick="copyShareText()">📋 Copy</button>
      <button class="share-btn" style="border-color:rgba(245,158,11,.35);color:var(--amber)" onclick="openShareModal()">👁 Preview</button>
    </div>

    <!-- ACTION ROW -->
    <div class="btn-row">
      <button class="btn btn-gold" style="padding:16px 32px;font-size:14px;font-weight:800;letter-spacing:.8px;border-radius:14px;box-shadow:0 4px 24px rgba(226,201,126,0.4)" onclick="exportPDF()">
        📄 Export PDF Report
      </button>
      <button class="btn btn-green" onclick="openModal('progressModal');renderProgress()">📊 Full Progress</button>
      <button class="btn btn-ghost" onclick="resetAll()">↺ New Assessment</button>
    </div>
  </div>`;
}

function renderQuizCard(q,qi){
  const answered=state.quizAnswers[qi]!==undefined;
  return`<div class="quiz-card">
    <div style="font-size:10px;letter-spacing:2px;color:var(--amber);font-weight:700;margin-bottom:6px">Q${qi+1}</div>
    <div class="quiz-q">${q.question}</div>
    ${q.options.map((opt,oi)=>{
      let cls="opt";
      if(answered){
        if(oi===q.correct)cls+=" correct";
        else if(oi===state.quizAnswers[qi]&&state.quizAnswers[qi]!==q.correct)cls+=" wrong";
      }
      return`<button class="${cls}" ${answered?"disabled":""} onclick="answerQuiz(${qi},${oi})">
        <span style="color:var(--amber);margin-right:8px;font-family:'DM Mono',monospace">${String.fromCharCode(65+oi)}.</span>${opt}
      </button>`;
    }).join("")}
  </div>`;
}

/* ══════════════════════════════════════════
   DEMO PROFILE
══════════════════════════════════════════ */
function loadDemoProfile(){
  state.role="AI Product Manager";
  state.skills={"AI/ML Basics":3,"Product Strategy":6,"Prompt Engineering":2,"Data Literacy":4,"Agile":7,"Stakeholder Mgmt":6};
  state.isDemo=true;
  runML(true);
}

/* ══════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════ */
async function runML(demo=false){
  const r=getRole(state.role);
  if(!r){showToast("⚠️ Role data missing","var(--red)");return;}
  state.gaps=r.skills.map((sk,i)=>{
    const demand=r.demandArr?r.demandArr[i]:(DEMAND[sk]||0.8);
    return{skill:sk,current:state.skills[sk]||1,required:r.req[i],
      gap:clamp(r.req[i]-(state.skills[sk]||1),0,10),demand};
  });
  state.phase=1;render();
  await sleep(200);
  state.gaps.forEach((_,i)=>{
    setTimeout(()=>{
      document.getElementById("gr"+i)?.classList.add("show");
      const fill=document.getElementById("gf"+i);
      if(fill)fill.style.width=(state.gaps[i].gap*10)+"%";
    },i*140);
  });
  await sleep(state.gaps.length*140+900);
  state.priorities=state.gaps
    .map(g=>({...g,score:parseFloat((g.gap*g.demand).toFixed(2)),priority:getPrio(g.gap,g.demand)}))
    .sort((a,b)=>b.score-a.score);
  state.phase=2;render();
  speak(`ML analysis complete for ${state.role}. Top gap: ${state.priorities[0]?.skill}.`,"⬡ ML Analysis");
}

async function runGenAI(){
  state.phase=3;state.loading=true;render();
  const top=state.priorities.filter(p=>p.gap>0).slice(0,3);
  const hasKey=!!getApiKey();

  if(!hasKey||state.isDemo){
    // DEMO / No-key mode: use sample data
    state.isDemo=true;
    for(let i=0;i<Math.min(top.length,SAMPLE_CONTENT.length);i++){
      const msg=document.getElementById("loadMsg");
      if(msg)msg.textContent=`📦 Loading sample content for "${top[i].skill}"… (${i+1}/${top.length})`;
      await sleep(700);
      state.genContent.push({...SAMPLE_CONTENT[i],skill:top[i].skill});
    }
    const msg=document.getElementById("loadMsg");
    if(msg)msg.textContent="📦 Loading sample quiz…";
    await sleep(600);
    state.quiz=SAMPLE_QUIZ;
  } else {
    // AI mode: call Claude API
    state.isDemo=false;
    for(let i=0;i<top.length;i++){
      const msg=document.getElementById("loadMsg");
      if(msg)msg.textContent=`⚡ Claude generating "${top[i].skill}" module… (${i+1}/${top.length})`;
      try{
        const raw=await callClaude(
          `Create a micro-learning module for a ${state.role} improving "${top[i].skill}" from ${top[i].current} to ${top[i].required}/10.
Return ONLY JSON: {"skill":"${top[i].skill}","summary":"2-sentence overview","keyPoints":["p1","p2","p3","p4"],"proTip":"one advanced tip","resources":[{"title":"name","type":"Course|Book|Tool|Article"}]}`
        );
        state.genContent.push(parseJSON(raw)||SAMPLE_CONTENT[i]||{skill:top[i].skill,summary:"Build this skill to advance.",keyPoints:["Study fundamentals","Build projects","Get certified","Teach others"],proTip:"Apply immediately.",resources:[{title:"Official Docs",type:"Article"}]});
      }catch(e){
        state.genContent.push(SAMPLE_CONTENT[Math.min(i,SAMPLE_CONTENT.length-1)]||{skill:top[i].skill,summary:"Build this skill.",keyPoints:["Study","Practice","Certify","Apply"],proTip:"Learn by doing.",resources:[]});
        showToast("⚠️ API error — showing sample content instead","var(--amber)");
      }
    }
    const msg2=document.getElementById("loadMsg");
    if(msg2)msg2.textContent="🧠 Building personalised quiz…";
    try{
      const quizRaw=await callClaude(
        `Create 5 multiple-choice questions for a ${state.role} on: ${top.map(t=>t.skill).join(", ")}.
Return ONLY a JSON array: [{"question":"...","options":["A","B","C","D"],"correct":0}]`
      );
      state.quiz=parseJSON(quizRaw)||SAMPLE_QUIZ;
    }catch{state.quiz=SAMPLE_QUIZ;}
  }

  // Build schedule
  const HOURS={Critical:12,High:8,Medium:5,Low:3};
  state.schedule=top.filter(t=>t.gap>0).map((t,i)=>({
    week:`Week ${i+1}`,skill:t.skill,hours:HOURS[t.priority]||6,
    sessions:["Mon 7PM","Wed 7PM","Sat 10AM"],
    milestone:`Master ${t.skill} core concepts + 2 practice exercises`
  }));

  state.loading=false;state.phase=4;render();
  saveProgress();

  const logs=[
    "📅 Auto-scheduled 3 sessions/week per skill",
    "📧 Reminder email drafts prepared",
    "📊 Progress KPIs initialised in tracker",
    "🔔 Milestone alerts configured",
    "🤝 Peer accountability pairing queued",
    "📈 Re-assessment scheduled post-module",
    `✅ Plan saved${state.isDemo?" (Demo mode — add API key for AI plan)":""}`
  ];
  for(const log of logs){await sleep(350);state.agentLog.push(log);render();}

  speak(
    `Your ${state.isDemo?"sample":"personalised"} learning plan is ready. ${state.isDemo?"This is demo data. Add your Claude API key for a fully personalised plan.":""} ${state.genContent.length} modules generated. ${state.schedule.length} weeks scheduled.`,
    "◎ Agent · Plan Ready"
  );
}

function answerQuiz(qi,oi){
  if(state.quizAnswers[qi]!==undefined)return;
  state.quizAnswers[qi]=oi;
  const correct=oi===state.quiz[qi].correct;
  state.quizScore={done:state.quizScore.done+1,correct:state.quizScore.correct+(correct?1:0)};
  saveProgress();render();
}
function switchTab(i){state.activeTab=i;render();}
function resetAll(){
  const cr=state.customRoles;
  state={phase:0,role:state.role,skills:{},gaps:[],priorities:[],genContent:[],quiz:[],schedule:[],agentLog:[],quizAnswers:{},quizScore:{done:0,correct:0},activeTab:0,loading:false,isDemo:false,checklist:{},sessionsDone:{},customRoles:cr,customRoleLoading:false};
  render();
}

/* ══════════════════════════════════════════
   EVENTS
══════════════════════════════════════════ */
function attachEvents(){
  document.querySelectorAll(".role-pill").forEach(btn=>{
    btn.addEventListener("click",()=>{state.role=btn.dataset.role;initSkills();render();});
  });
  document.querySelectorAll(".skill-input").forEach(input=>{
    input.addEventListener("input",()=>{
      const sk=input.dataset.skill,v=parseInt(input.value);
      state.skills[sk]=v;
      const id=sk.replace(/\W/g,"_");
      const val=document.getElementById("sv_"+id);
      const fill=document.getElementById("sf_"+id);
      if(val)val.innerHTML=`${v}<span style="color:var(--text4)">/10</span>`;
      if(fill)fill.style.width=(v*10)+"%";
    });
  });
  // Close modals on overlay click
  document.querySelectorAll(".modal-overlay").forEach(m=>{
    m.addEventListener("click",e=>{if(e.target===m)m.style.display="none";});
  });
}

/* ══════════════════════════════════════════
   BOOT
══════════════════════════════════════════ */
initSkills();
render();
</script>
